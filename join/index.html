<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Show - LuminaCrowd</title>
    <meta name="description" content="Join a LuminaCrowd light show and sync your phone with the crowd.">
    <meta property="og:title" content="Join my LuminaCrowd show!">
    <meta property="og:description" content="Tap to sync your phone with the crowd light show.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #000;
            color: #fff;
            font-family: 'DM Sans', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(100,60,255,0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 100%, rgba(255,50,80,0.1) 0%, transparent 50%);
        }
        .card {
            position: relative;
            text-align: center;
            padding: 48px 32px;
            max-width: 380px;
            width: 90%;
        }
        .icon { font-size: 64px; margin-bottom: 24px; }
        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .sub {
            color: rgba(255,255,255,0.45);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 36px;
        }
        .btn {
            display: inline-block;
            background: #fff;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            padding: 16px 48px;
            border-radius: 14px;
            text-decoration: none;
            transition: opacity 0.2s;
            width: 100%;
        }
        .btn:hover { opacity: 0.85; }
        .store {
            display: inline-block;
            margin-top: 20px;
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            text-decoration: none;
        }
        .store:hover { color: rgba(255,255,255,0.6); }
        .helper {
            margin-top: 14px;
            color: rgba(255,255,255,0.38);
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div class="card" id="fallback">
        <div class="icon">&#x1F4F1;</div>
        <h1>Join the Light Show</h1>
        <p class="sub">If LuminaCrowd did not open automatically, use the button below to jump into the app and sync your phone with the crowd.</p>
        <a class="btn" id="open-btn" href="#">Open in App</a>
        <p class="helper">Keep this page open if you need App Store access or want to retry from the browser.</p>
        <br>
        <a class="store" href="https://apps.apple.com/app/luminacrowd/id6741419737">Don't have the app? Get it here &rarr;</a>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var config = params.get('c');
            var fallback = document.getElementById('fallback');
            if (!config) {
                fallback.querySelector('h1').textContent = 'Invalid Link';
                fallback.querySelector('.sub').textContent = 'This link is missing show data. Ask the host to share a new link.';
                fallback.querySelector('.btn').style.display = 'none';
                fallback.querySelector('.helper').style.display = 'none';
                return;
            }

            var deepLink = 'luminacrowd://show/' + config;
            var openBtn = document.getElementById('open-btn');
            openBtn.href = deepLink;
        })();
    </script>
</body>
</html>
